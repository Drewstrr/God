<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Poll Nou · Crew Zaky</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:    #0A0A0A;
            --bg1:   #111111;
            --card:  #141414;
            --card2: #1A1A1A;
            --bdr:   #1E1E1E;
            --bdr2:  #2A2A2A;
            --t1:    #F0F0F0;
            --t2:    #A0A0A0;
            --t3:    #666666;
        }
        body.light {
            --bg:    #FFFFFF;
            --bg1:   #FFFFFF;
            --card:  #FFFFFF;
            --card2: #F8F8F8;
            --bdr:   #F0F0F0;
            --bdr2:  #E8E8E8;
            --t1:    #0A0A0A;
            --t2:    #444444;
            --t3:    #777777;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh;
            margin: 0;
            transition: background 0.3s, color 0.3s;
        }

        /* ── Layout ── */
        .page-wrap {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 0 48px;
        }

        /* ── Header ── */
        .cp-header {
            background: linear-gradient(135deg, #0A0A0A 0%, #111827 60%, #0A0A0A 100%);
            padding: 20px 20px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        body.light .cp-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #1a1a2e 100%);
        }
        .cp-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 18px;
            flex-shrink: 0;
            transition: background 0.18s;
        }
        .cp-back:hover { background: rgba(255,255,255,0.14); }
        .cp-header-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 700;
            font-style: italic;
            color: #F0F0F0;
        }
        .cp-header-sub {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #F97316;
            margin-top: 1px;
        }

        /* ── Form card ── */
        .cp-form-wrap {
            padding: 24px 16px 0;
        }
        .cp-section-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--t3);
            margin-bottom: 8px;
        }

        /* ── Inputs ── */
        .cp-input {
            width: 100%;
            background: var(--card2);
            border: 1.5px solid var(--bdr2);
            border-radius: 14px;
            color: var(--t1);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            padding: 15px 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }
        .cp-input::placeholder { color: var(--t3); }
        .cp-input:focus {
            border-color: #0EA5E9;
            box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
        }

        /* ── Option rows ── */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }
        .option-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option-number {
            flex-shrink: 0;
            width: 26px;
            height: 26px;
            border-radius: 8px;
            background: var(--bdr2);
            color: var(--t3);
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .option-row .cp-input {
            margin: 0;
        }
        .btn-remove-option {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: transparent;
            border: 1.5px solid var(--bdr2);
            color: var(--t3);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.18s, color 0.18s, background 0.18s;
            -webkit-tap-highlight-color: transparent;
            line-height: 1;
        }
        .btn-remove-option:hover {
            border-color: rgba(239,68,68,0.4);
            color: #EF4444;
            background: rgba(239,68,68,0.07);
        }

        /* ── Add option button ── */
        .btn-add-option {
            display: flex;
            align-items: center;
            gap: 7px;
            width: 100%;
            padding: 13px 16px;
            background: transparent;
            border: 1.5px dashed var(--bdr2);
            border-radius: 14px;
            color: var(--t3);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 0.18s, color 0.18s;
            -webkit-tap-highlight-color: transparent;
            margin-top: 4px;
        }
        .btn-add-option:hover {
            border-color: rgba(14,165,233,0.45);
            color: #0EA5E9;
        }

        /* ── Submit button ── */
        .btn-submit-poll {
            width: 100%;
            background: #B22222;
            color: #FFFFFF;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.05em;
            border: none;
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            margin-top: 28px;
            transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-submit-poll:hover:not(:disabled) {
            background: #8B0000;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(178,34,34,0.40);
        }
        .btn-submit-poll:active:not(:disabled) { transform: scale(0.98); }
        .btn-submit-poll:disabled {
            background: #2A1010;
            color: #5A2020;
            cursor: not-allowed;
        }

        /* ── Status message ── */
        #cp-status {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            min-height: 20px;
            margin-top: 14px;
            color: var(--t3);
        }
        #cp-status.err  { color: #EF4444; }
        #cp-status.ok   { color: #22C55E; }

        /* ── Divider ── */
        .cp-divider {
            height: 1px;
            background: var(--bdr);
            margin: 24px 0;
        }

        /* ── Auth redirect overlay ── */
        #cp-auth-guard {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 24px;
        }
        #cp-auth-guard.hidden { display: none; }
        .cp-guard-card {
            text-align: center;
            max-width: 300px;
        }
        .cp-guard-card p { color: #666; font-size: 13px; margin-top: 8px; }
        .cp-guard-card a {
            display: inline-block;
            margin-top: 20px;
            padding: 13px 28px;
            background: #0EA5E9;
            color: #fff;
            font-weight: 800;
            font-size: 14px;
            border-radius: 12px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<!-- Auth guard (hidden once session confirmed) -->
<div id="cp-auth-guard">
    <div class="cp-guard-card">
        <p style="font-size:2rem;">🔐</p>
        <p>Trebuie să fii logat pentru a crea un poll.</p>
        <a href="crew-zaky.html">Mergi la Login</a>
    </div>
</div>

<div class="page-wrap">

    <!-- Header -->
    <div class="cp-header">
        <a href="crew-zaky.html" class="cp-back" title="Înapoi">←</a>
        <div>
            <div class="cp-header-sub">⚔ WarRoom</div>
            <div class="cp-header-title">Poll Nou</div>
        </div>
    </div>

    <!-- Form -->
    <div class="cp-form-wrap">

        <!-- Întrebarea -->
        <div class="mb-6">
            <div class="cp-section-label">Propunere / Întrebare</div>
            <textarea id="poll-question" class="cp-input"
                      rows="3"
                      placeholder="ex: Unde mergem în prima seară?"
                      style="resize:none; line-height:1.5;"></textarea>
        </div>

        <div class="cp-divider"></div>

        <!-- Variante de răspuns -->
        <div class="cp-section-label">Variante de răspuns</div>
        <div class="options-list" id="options-list">
            <!-- generate by JS -->
        </div>
        <button class="btn-add-option" onclick="addOption()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Adaugă variantă
        </button>

        <!-- Submit -->
        <button class="btn-submit-poll" id="cp-submit" onclick="submitPoll()">
            🗳 Lansează Votul
        </button>
        <div id="cp-status"></div>

    </div>
</div>

<script>
const SUPA_URL = 'https://jdhpczzxighkydfvites.supabase.co';
const SUPA_KEY = 'sb_publishable_dqGDI5IR_m4Er4y4yKpXbQ_u2sr6Iuw';
const _sb = supabase.createClient(SUPA_URL, SUPA_KEY, {
    auth: { persistSession: true, autoRefreshToken: true }
});

// ── Theme (sync cu crew-zaky.html) ────────────────────────────
const savedTheme = localStorage.getItem('zaky-theme') || 'light';
if (savedTheme === 'light') document.body.classList.add('light');

// ── Auth guard ────────────────────────────────────────────────
_sb.auth.getSession().then(function({ data: { session } }) {
    if (session) {
        document.getElementById('cp-auth-guard').classList.add('hidden');
    }
    // If no session, auth guard stays visible → user clicks "Mergi la Login"
});

// ── Options state ─────────────────────────────────────────────
let optionCount = 0;

function addOption(value = '') {
    optionCount++;
    const list = document.getElementById('options-list');
    const row  = document.createElement('div');
    row.className = 'option-row';
    row.dataset.optId = String(optionCount);
    row.innerHTML = `
        <div class="option-number">${list.children.length + 1}</div>
        <input type="text" class="cp-input option-input"
               placeholder="Variantă ${list.children.length + 1}"
               value="${value.replace(/"/g, '&quot;')}"
               maxlength="120">
        <button class="btn-remove-option" onclick="removeOption(this)" title="Șterge">×</button>
    `;
    list.appendChild(row);
    renumberOptions();
    row.querySelector('input').focus();
}

function removeOption(btn) {
    const list = document.getElementById('options-list');
    if (list.children.length <= 2) return; // minim 2
    btn.closest('.option-row').remove();
    renumberOptions();
}

function renumberOptions() {
    const rows = document.querySelectorAll('#options-list .option-row');
    rows.forEach((row, i) => {
        row.querySelector('.option-number').textContent = i + 1;
        row.querySelector('.option-input').placeholder  = `Variantă ${i + 1}`;
    });
}

// Inițializare cu 2 opțiuni goale
addOption();
addOption();

// ── Submit ────────────────────────────────────────────────────
async function submitPoll() {
    const statusEl = document.getElementById('cp-status');
    const submitBtn = document.getElementById('cp-submit');

    statusEl.className = '';
    statusEl.textContent = '';

    const question = document.getElementById('poll-question').value.trim();
    if (!question) {
        statusEl.className = 'err';
        statusEl.textContent = 'Adaugă o întrebare înainte să lansezi votul.';
        document.getElementById('poll-question').focus();
        return;
    }

    const inputs = Array.from(document.querySelectorAll('#options-list .option-input'));
    const options = inputs
        .map((inp, i) => ({ id: String(i + 1), text: inp.value.trim() }))
        .filter(o => o.text.length > 0);

    if (options.length < 2) {
        statusEl.className = 'err';
        statusEl.textContent = 'Adaugă cel puțin 2 variante de răspuns.';
        return;
    }

    const { data: { session } } = await _sb.auth.getSession();
    if (!session) {
        window.location.href = 'crew-zaky.html';
        return;
    }

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Se salvează...';

    const { error } = await _sb.from('polls').insert({
        question:  question,
        options:   options,
        is_active: true,
    });

    if (error) {
        statusEl.className   = 'err';
        statusEl.textContent = 'Eroare: ' + error.message;
        submitBtn.disabled    = false;
        submitBtn.textContent = '🗳 Lansează Votul';
    } else {
        statusEl.className   = 'ok';
        statusEl.textContent = 'Poll creat! Redirecționare...';
        setTimeout(() => { window.location.href = 'crew-zaky.html#warroom'; }, 1200);
    }
}
</script>
</body>
</html>
