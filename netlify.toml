[functions]
  node_bundler = "esbuild"

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/crew-zaky"
  to = "/crew-zaky.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Service worker-ul NU se cache-uiește niciodată → update-urile sunt detectate imediat
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Paginile HTML se revalidează mereu → primești mereu ultima versiune
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
